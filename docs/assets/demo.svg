<svg xmlns="http://www.w3.org/2000/svg" width="760" height="492" viewBox="0 0 760 492" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <rect width="760" height="492" rx="10" fill="#0d1117"/>
  <rect width="760" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="380" y="21" fill="#8b949e" text-anchor="middle">dripjson — broken JSON prefixes, handled</text>

  <text x="24" y="62" fill="#8b949e"># the stream stopped mid-string, three containers deep…</text>
  <text x="24" y="82" fill="#c9d1d9" xml:space="preserve">{"name": "search_flights", "arguments": {…, "filters": {"max_stops": 1, "cabin": "premium<tspan fill="#f85149">▌</tspan></text>

  <text x="24" y="114" fill="#7ee787">$ dripjson complete examples/tool-call.partial.json</text>
  <text x="24" y="134" fill="#c9d1d9" xml:space="preserve">{"name": "search_flights", "arguments": {…, "cabin": "premium<tspan fill="#28c840">"}}}</tspan>   <tspan fill="#8b949e"># valid JSON</tspan></text>
  <text x="24" y="154" fill="#8b949e" xml:space="preserve">repair: closed-string</text>
  <text x="24" y="174" fill="#8b949e" xml:space="preserve">repair: closed-containers (}}})</text>

  <text x="24" y="206" fill="#7ee787">$ dripjson events examples/tool-call.partial.json --chunk 60 --deltas</text>
  <text x="24" y="226" fill="#c9d1d9" xml:space="preserve">{"type":<tspan fill="#79c0ff">"openObject"</tspan>,"path":[]}</text>
  <text x="24" y="246" fill="#c9d1d9" xml:space="preserve">{"type":<tspan fill="#79c0ff">"key"</tspan>,"path":["name"],"key":"name"}</text>
  <text x="24" y="266" fill="#c9d1d9" xml:space="preserve">{"type":<tspan fill="#d2a8ff">"delta"</tspan>,"path":["name"],"text":"search_flights"}</text>
  <text x="24" y="286" fill="#c9d1d9" xml:space="preserve">{"type":<tspan fill="#79c0ff">"value"</tspan>,"path":["name"],"value":"search_flights"}</text>
  <text x="24" y="306" fill="#8b949e">…</text>
  <text x="24" y="326" fill="#c9d1d9" xml:space="preserve">{"type":<tspan fill="#79c0ff">"value"</tspan>,"path":["arguments","passengers"],"value":2}   <tspan fill="#8b949e"># settled early</tspan></text>

  <text x="24" y="358" fill="#7ee787">$ dripjson status examples/tool-call.partial.json <tspan fill="#8b949e"># scriptable gate</tspan></text>
  <text x="24" y="378" fill="#c9d1d9" xml:space="preserve">partial · depth 3 · open "}}}" · pending value-string · consumed 169 chars   <tspan fill="#f85149">exit 1</tspan></text>

  <text x="24" y="410" fill="#8b949e"># and in code: one call, best-effort value + completeness</text>
  <text x="24" y="430" fill="#c9d1d9" xml:space="preserve"><tspan fill="#ff7b72">const</tspan> { value, complete } = parsePartial(buffer);</text>
  <text x="24" y="450" fill="#c9d1d9" xml:space="preserve">value.arguments.filters.cabin  <tspan fill="#8b949e">// "premium" — usable now, complete === false</tspan></text>
  <text x="24" y="474" fill="#c9d1d9" xml:space="preserve">corruption ≠ truncation: {"a" 1} <tspan fill="#f85149">throws DripError</tspan> — recovery never guesses.</text>
</svg>
